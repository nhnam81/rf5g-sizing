<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tower" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>
  <!-- Cell tower -->
  <rect x="118" y="80" width="20" height="120" fill="url(#tower)" rx="2"/>
  <rect x="100" y="190" width="56" height="10" fill="url(#tower)" rx="2"/>
  <!-- Signal waves left -->
  <path d="M 90 100 Q 70 128 90 156" stroke="#64b5f6" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 75 85 Q 45 128 75 171" stroke="#42a5f5" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Signal waves right -->
  <path d="M 166 100 Q 186 128 166 156" stroke="#64b5f6" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 181 85 Q 211 128 181 171" stroke="#42a5f5" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- 5G text -->
  <text x="128" y="72" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">5G</text>
</svg>